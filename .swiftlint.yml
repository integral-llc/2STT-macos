excluded:
  - .build
  - speech_test*.swift
  - "*.generated.swift"

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 30

nesting:
  type_level: 2
  function_level: 4

identifier_name:
  min_length: 2
  max_length: 60
  excluded:
    - i
    - x
    - y
    - id
    - ch
    - cf
    - c
    - h
    - m
    - s
    - r1
    - r2

large_tuple:
  warning: 3

disabled_rules:
  - trailing_comma
  - todo
  - opening_brace
  - closure_parameter_position
  - multiple_closures_with_trailing_closure

opt_in_rules:
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unowned_variable_capture
  - yoda_condition

reporter: xcode
